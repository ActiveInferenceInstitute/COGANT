# macOS / Linux linker configuration for PyO3 extension modules.
#
# When pyo3 is built with the `extension-module` feature it does NOT link
# against libpython — Python symbols are resolved at runtime when the module
# is imported by the interpreter. `cargo build` therefore needs to be told
# that unresolved dynamic symbols are expected, otherwise linking fails on
# macOS and Linux.
#
# Maturin sets these flags automatically; when using plain `cargo build`
# (e.g. to compile the workspace for CI or development without a Python
# wheel round-trip) we need to set them here.

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-undefined",
    "-C", "link-arg=dynamic_lookup",
]

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-undefined",
    "-C", "link-arg=dynamic_lookup",
]

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-Wl,--unresolved-symbols=ignore-all",
]

[target.aarch64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-Wl,--unresolved-symbols=ignore-all",
]
