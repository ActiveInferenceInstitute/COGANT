# Pre-commit hooks for the COGANT package.
#
# Install with:
#     pre-commit install
#
# Run against all files manually with:
#     pre-commit run --all-files
#
# See: https://pre-commit.com

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024]

  - repo: local
    hooks:
      - id: metrics-freshness
        name: METRICS.yaml freshness
        entry: uv run python ../tools/check_metrics_fresh.py
        language: system
        pass_filenames: false
        always_run: false
        files: ^evaluation/METRICS\.yaml$
