name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: cogant

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Ruff check (no-fix; ratchet)
        run: uv run ruff check --no-fix --output-format=github py/cogant/ tests/

      - name: Ruff format --check
        run: uv run ruff format --check py/cogant/ tests/

      - name: Docs/constants drift gate
        # Active README/AGENTS/MkDocs/manuscript status language should not
        # regress to stale version, wave, or hard-coded section-number claims.
        run: cd .. && uv run --directory cogant python ../tools/audit_docs_constants.py

      - name: Folder documentation coverage gate
        # Every COGANT-owned documentable folder needs local README/AGENTS
        # signposting unless the tool documents an explicit exception.
        run: cd .. && uv run --directory cogant python ../tools/audit_folder_docs.py

      - name: Stage-list drift gate
        # TODO #4 durable fix — every documented full-pipeline stage sequence
        # must match cogant.pipeline.RUNNER_STAGES verbatim. The script lives
        # at the staging root (one level above this CI's default working dir).
        run: cd .. && uv run --directory cogant python ../tools/audit_stage_list.py

      - name: Metrics-freshness gate (with laundering check)
        # RedTeam F19 durable fix — re-classifies every row of
        # roundtrip_results.jsonl via the same _status() logic as
        # regenerate_metrics.py and asserts the count distribution matches
        # METRICS.yaml. Catches the keystone laundering pattern.
        run: cd .. && uv run --directory cogant python ../tools/check_metrics_fresh.py

      - name: Coverage-table drift gate
        # RedTeam F10 durable fix — strict comparison of every per-module
        # row in @tbl:coverage-stmt-modules against either .coverage SQLite
        # (when present) or the intentionally committed cogant/coverage.json
        # fallback. Catches hand-edit drift the prior gate could not enforce
        # on a clean checkout.
        run: cd .. && uv run --directory cogant python ../tools/check_coverage_table.py --strict

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run mypy (strict)
        # ``--no-warn-unused-configs`` because the defensive overrides in
        # ``pyproject.toml`` (tests.*, cogant._rust, src.gnn.*) only fire
        # under ``mypy .`` or minimal installs; reporting them as "unused"
        # against ``py/cogant/`` is noise.
        run: uv run mypy py/cogant/ --strict --no-warn-unused-configs

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install all extras
        run: uv sync --extra all

      - name: Fast tests (no coverage, skip property and slow)
        run: uv run pytest tests/ --no-cov -q --ignore=tests/property/ -m "not slow"

      - name: Property / hypothesis tests
        run: uv run pytest tests/property/ -q --override-ini="addopts=" -p no:warnings

      - name: Full tests with coverage gate (3.11 only)
        if: matrix.python-version == '3.11'
        # Coverage gate raised from 75% to 89% to align with ``pyproject.toml``
        # ``[tool.pytest.ini_options].addopts.--cov-fail-under=89``. The
        # manuscript-reported headline number (~94.98%) is the *measured*
        # value on the canonical run; the gate floor (89%) preserves a small
        # margin so coverage fluctuations from one wave to the next don't
        # turn CI red on a real refactor.
        run: uv run pytest tests/ -q -m "not slow" --cov=cogant --cov-fail-under=89

  rust-build:
    name: Rust build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ``actions-rs/*`` is archived (Node 12, last released 2020); use the
      # community-maintained ``dtolnay/rust-toolchain`` action which is the
      # de-facto replacement and runs on the modern Node runtime.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cogant/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cogant/rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo check
        run: cargo check --manifest-path rust/Cargo.toml
        continue-on-error: true

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Inline ``pip install pre-commit`` rather than using
      # ``pre-commit/action`` because that action still bundles
      # ``actions/cache@v4`` (Node 20). Running pre-commit directly
      # keeps the whole job on the modern runtime.
      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit

      - name: Cache pre-commit hooks
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.11-${{ hashFiles('cogant/.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py3.11-

      - name: Run pre-commit
        run: pre-commit run --config cogant/.pre-commit-config.yaml --all-files --show-diff-on-failure
