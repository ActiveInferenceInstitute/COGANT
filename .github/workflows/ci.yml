name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: cogant

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Ruff check (no-fix; ratchet)
        run: uv run ruff check --no-fix --output-format=github py/cogant/ tests/

      - name: Ruff format --check
        run: uv run ruff format --check py/cogant/ tests/

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run mypy (strict)
        # ``--no-warn-unused-configs`` because the defensive overrides in
        # ``pyproject.toml`` (tests.*, cogant._rust, src.gnn.*) only fire
        # under ``mypy .`` or minimal installs; reporting them as "unused"
        # against ``py/cogant/`` is noise.
        run: uv run mypy py/cogant/ --strict --no-warn-unused-configs

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install all extras
        run: uv sync --extra all

      - name: Fast tests (no coverage, skip property and slow)
        run: uv run pytest tests/ --no-cov -q --ignore=tests/property/ -m "not slow"

      - name: Property / hypothesis tests
        run: uv run pytest tests/property/ -q --override-ini="addopts=" -p no:warnings

      - name: Full tests with coverage gate (3.11 only)
        if: matrix.python-version == '3.11'
        run: uv run pytest tests/ -q -m "not slow" --cov=cogant --cov-fail-under=75

  rust-build:
    name: Rust build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ``actions-rs/*`` is archived (Node 12, last released 2020); use the
      # community-maintained ``dtolnay/rust-toolchain`` action which is the
      # de-facto replacement and runs on the modern Node runtime.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cogant/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cogant/rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo check
        run: cargo check --manifest-path rust/Cargo.toml
        continue-on-error: true

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --config cogant/.pre-commit-config.yaml --all-files
