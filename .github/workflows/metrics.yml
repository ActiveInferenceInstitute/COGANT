name: metrics-refresh

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  metrics:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cogant
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Regenerate metrics
        run: uv run python ../tools/regenerate_metrics.py

      - name: Check metrics not stale
        run: |
          if ! git diff --quiet evaluation/METRICS.yaml; then
            echo "METRICS.yaml is stale — run tools/regenerate_metrics.py and commit"
            git diff evaluation/METRICS.yaml
            exit 1
          fi
