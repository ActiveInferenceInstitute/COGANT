name: METRICS.yaml freshness gate

on:
  pull_request:

jobs:
  check-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: cogant
        run: uv sync --all-extras

      - name: Check METRICS.yaml is not stale
        working-directory: cogant
        run: uv run python ../tools/check_metrics_fresh.py
