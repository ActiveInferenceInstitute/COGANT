name: Performance smoke

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 6am UTC
  workflow_dispatch:

jobs:
  perf:
    name: Graph-build benchmark
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cogant
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install all extras
        run: uv sync --extra all

      - name: Run graph-build benchmark
        run: uv run python benchmarks/bench_graph_build.py 2>&1 | tee perf_results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v5
        with:
          name: perf-results
          path: perf_results.txt
          retention-days: 90
